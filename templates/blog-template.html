<!-- SEO Blog Template (HTML) -->
<section class="blog-article">
  <header class="blog-header">
    <h1>{{title}}</h1>
    <p>{{summary}}</p>

    <div class="post-meta">
      <span>Time: {{date}}</span>
      <span>Category: {{category}}</span>
      <span>Author: {{author}}</span>
    </div>
    <div class="mt-4 flex flex-wrap gap-2 text-xs text-gray-400">
      {{tags}}
    </div>
  </header>

  <article class="blog-content content prose prose-invert max-w-none text-gray-200">
    {{content}}
  </article>
</section>
