<!-- SEO Blog Template (HTML) -->
<section class="blog-article">
  <header class="blog-header">
    <h1>{{title}}</h1>
    <p>{{summary}}</p>

    <div class="post-meta">
      <span>Time: {{date}}</span>
      <span>Category: {{category}}</span>
      <span>Author: {{author}}</span>
    </div>
  </header>

  <div class="toc">
    <strong>Table of Contents</strong>
    {{toc}}
  </div>

  <article class="content">
    {{content}}
  </article>
</section>
